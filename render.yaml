services:
  - type: web
    name: uni-hub
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: MONGODB_DB
        value: uni_hub
      - key: MONGODB_URI
        sync: false
