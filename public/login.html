<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNI Hub | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body data-page="login" class="alt-page">
    <main class="auth-shell">
      <section class="auth-card">
        <div>
          <p class="eyebrow">Welcome Back</p>
          <h1>Sign in to UNI Hub</h1>
        </div>
        <form class="auth-form" id="login-form">
          <label>
            Email
            <input type="email" name="email" placeholder="alex@campus.edu" required />
          </label>
          <label>
            Password
            <input type="password" name="password" placeholder="Enter your password" required />
          </label>
          <button type="submit" class="button full">Log In</button>
        </form>
        <p class="auth-note auth-error" id="auth-message"></p>
        <p class="auth-note">New here? <a href="/register">Create your account</a></p>
      </section>
    </main>
    <script src="/script.js"></script>
  </body>
</html>
