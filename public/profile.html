<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNI Hub | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body data-page="profile" class="app-page">
    <header class="site-header">
      <div class="shell topbar">
        <a href="/" class="brand">
          <span class="brand-mark">U</span>
          <span>
            <span class="eyebrow">Student Workspace</span>
            <strong class="brand-name">UNI Hub Profile</strong>
          </span>
        </a>
        <nav class="site-nav">
          <a href="/dashboard">Dashboard</a>
          <a href="/profile" class="active-link">Profile</a>
          <a href="/joinclub">Join a Club</a>
          <a href="/createclub">Create a Club</a>
          <a href="/adminpanel" data-admin-link>Admin</a>
          <a href="/login" class="button secondary" id="logout-link">Log Out</a>
        </nav>
      </div>
    </header>

    <main class="shell app-shell">
      <section class="page-hero surface-card">
        <div>
          <p class="eyebrow">Profile Overview</p>
          <h1>Your student workspace profile.</h1>
          <p>Review your account details, activity summary, and club memberships in one place.</p>
        </div>
      </section>
      <section id="profile-card" class="profile-layout"></section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
