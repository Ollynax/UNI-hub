<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNI Hub | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="alt-page">
    <main class="auth-shell">
      <section class="auth-card wide-card">
        <div>
          <p class="eyebrow">Join the Platform</p>
          <h1>Create your UNI Hub account</h1>
        </div>
        <form class="auth-form grid-form">
          <label>
            Full Name
            <input type="text" placeholder="Alex Morgan" />
          </label>
          <label>
            Student ID
            <input type="text" placeholder="UNI-2026-014" />
          </label>
          <label>
            Email
            <input type="email" placeholder="alex@campus.edu" />
          </label>
          <label>
            Department
            <input type="text" placeholder="Computer Science" />
          </label>
          <label>
            Password
            <input type="password" placeholder="Create a password" />
          </label>
          <label>
            Confirm Password
            <input type="password" placeholder="Repeat password" />
          </label>
          <a href="/dashboard" class="button full span-2">Create Account</a>
        </form>
      </section>
    </main>
  </body>
</html>
