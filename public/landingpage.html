<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNI Hub | Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body data-page="landing" class="marketing-page">
    <main class="shell simple-landing">
      <section class="surface-card landing-card">
        <p class="eyebrow">Welcome to UNI Hub</p>
        <h1>Manage student life through one professional campus platform.</h1>
        <p>
          Sign in to continue or create a new account to access the UNI Hub dashboard,
          club directory, event tools, and institution workspace.
        </p>
        <div class="hero-actions">
          <a href="/register" class="button">Create Account</a>
          <a href="/login" class="button secondary">Log In</a>
        </div>
      </section>
    </main>
    <script src="/script.js"></script>
  </body>
</html>
